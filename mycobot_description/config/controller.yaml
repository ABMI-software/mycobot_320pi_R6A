---
controller_manager:
  ros__parameters:
    update_rate: 500
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      publish_rate: 150.0

    mycobot_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      publish_rate: 100.0

    gripper_position_controller:
      type: position_controllers/JointGroupPositionController
      publish_rate: 80.0

mycobot_controller:
  ros__parameters:
    joints:
      - joint2_to_joint1
      - joint3_to_joint2
      - joint4_to_joint3
      - joint5_to_joint4
      - joint6_to_joint5
      - joint6output_to_joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: true
    hardware_state_has_offset: true
    deduce_states_from_derivatives: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

    gains:
      joint2_to_joint1:      {p: 100.0, i: 0.01, d: 1.0}
      joint3_to_joint2:      {p: 100.0, i: 0.01, d: 1.0}
      joint4_to_joint3:      {p: 100.0, i: 0.01, d: 1.0}
      joint5_to_joint4:      {p: 100.0, i: 0.01, d: 1.0}
      joint6_to_joint5:      {p: 100.0, i: 0.01, d: 1.0}
      joint6output_to_joint6: {p: 100.0, i: 0.01, d: 1.0}

gripper_position_controller:
  ros__parameters:
    # Four joints driven explicitly. The caller must publish a 4-element
    # Float64MultiArray in exactly this order:
    #   [servo_left, servo_right, tip_left, tip_right]
    # Close:  [-0.7, +0.7, +0.7, -0.7]   |   Open: [0, 0, 0, 0]
    joints:
      - gripper_controller
      - gripper_base_to_gripper_right3
      - gripper_left3_to_gripper_left1
      - gripper_right3_to_gripper_right1
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    gains:
      gripper_controller:                 {p: 60.0, i: 0.005, d: 1.5, i_clamp_min: -0.15, i_clamp_max: 0.15, antiwindup: true}
      gripper_base_to_gripper_right3:     {p: 60.0, i: 0.005, d: 1.5, i_clamp_min: -0.15, i_clamp_max: 0.15, antiwindup: true}
      gripper_left3_to_gripper_left1:     {p: 30.0, i: 0.005, d: 1.0, i_clamp_min: -0.15, i_clamp_max: 0.15, antiwindup: true}
      gripper_right3_to_gripper_right1:   {p: 30.0, i: 0.005, d: 1.0, i_clamp_min: -0.15, i_clamp_max: 0.15, antiwindup: true}
